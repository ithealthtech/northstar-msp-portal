<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Northstar Portal Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="setup.css">
  <link rel="stylesheet" href="enterprise.css">
</head>
<body class="setup-surface">
  <main class="setup-shell">
    <section class="setup-card">
      <div class="setup-head">
        <span>Self-hosted setup</span>
        <h1>Configure your Northstar workspace.</h1>
        <p>Set the public address, administrator access, data profile, and hosting target for this installation.</p>
      </div>
      <form id="setupForm">
        <div class="grid two">
          <label>Portal domain<input name="domain" required placeholder="https://signatures.yourdomain.com"></label>
          <label>Company name<input name="companyName" required placeholder="Your MSP company"></label>
        </div>
        <div class="grid two">
          <label>Admin email<input name="adminEmail" type="email" required placeholder="admin@yourdomain.com"></label>
          <label>Admin password<input name="adminPassword" type="password" required minlength="12" placeholder="At least 12 characters"></label>
        </div>
        <section class="fieldset">
          <h2>Database</h2>
          <div class="grid two">
            <label>Database engine<select name="databaseProvider"><option value="sqlite">SQLite (current release)</option></select></label>
            <label>Database name<input name="databaseName" placeholder="signatures"></label>
            <label>SQL server / host<input name="databaseHost" placeholder="localhost or sql.domain.com"></label>
            <label>Database user<input name="databaseUser" placeholder="signature_app"></label>
          </div>
        </section>
        <section class="fieldset">
          <h2>Hosting</h2>
          <div class="grid two">
            <label>Deployment target<select name="deploymentTarget"><option value="node">Node.js</option><option value="windows-service">Windows service</option><option value="iis-reverse-proxy">IIS reverse proxy</option><option value="docker">Docker</option></select></label>
            <label>Asset base URL<input name="assetBaseUrl" placeholder="https://signatures.yourdomain.com"></label>
            <label>Media base URL<input name="mediaBaseUrl" placeholder="https://signatures.yourdomain.com/media"></label>
            <label>SMTP host<input name="smtpHost" placeholder="smtp.office365.com"></label>
            <label>From email<input name="smtpFrom" type="email" placeholder="noreply@yourdomain.com"></label>
          </div>
        </section>
        <div class="actions">
          <a href="/signature.html">Back to app</a>
          <button type="submit">Complete setup</button>
        </div>
      </form>
      <div class="status" id="status"></div>
    </section>
  </main>
  <script src="setup.js"></script>
</body>
</html>
